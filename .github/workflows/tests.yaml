name: test
on:
  push:
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Linting code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install black and flake8
        run: python -m pip install black flake8
      - name: Lint using black
        run: python -m black --check pyrosm
      - name: Lint using flake8
        run: python -m flake8 pyrosm

  test:
    name: Run tests (${{ matrix.os }}, ${{ matrix.env }})
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        env:
          - ci/310-conda.yaml
          - ci/311-conda.yaml
          - ci/312-conda.yaml
          - ci/313-conda.yaml
          - ci/314-conda.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: ${{ matrix.env }}
          auto-activate-base: false
          activate-environment: test
          channel-priority: strict

      - name: Install pyrosm
        shell: bash -l {0}
        # Build against the conda-provided build deps (Cython, cykhash, pyrobuf).
        # Build isolation would refetch pyrobuf from PyPI and build it against
        # modern setuptools, which fails ('PyrobufDistribution' has no 'dry_run').
        run: pip install -e . --no-build-isolation

      - name: Check environment
        shell: bash -l {0}
        run: |
          micromamba info
          micromamba list

      - name: Test pyrosm
        shell: bash -l {0}
        run: pytest -v -r s --color=yes --cov=pyrosm --cov-append --cov-report term-missing --cov-report xml tests/

      - name: Update codecov.io
        uses: codecov/codecov-action@v5
        with:
          # Use the repo upload token from secrets. The legacy v3.1.1 uploader
          # used the rate-limited tokenless endpoint; v5 uses the Codecov CLI.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          # Coverage upload is informational; a transient Codecov problem
          # (e.g. a 429 rate limit) must not fail the test job.
          fail_ci_if_error: false
