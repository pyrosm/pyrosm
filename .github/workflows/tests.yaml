name: test
on:
  # Run on pushes to the default branch and on PRs. Scoping push to master
  # avoids the duplicate push+pull_request runs on every PR branch.
  push:
    branches: [master]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Linting code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install black and flake8
        run: python -m pip install black flake8
      - name: Lint using black
        run: python -m black --check pyrosm
      - name: Lint using flake8
        run: python -m flake8 pyrosm

  test:
    name: Run tests (${{ matrix.os }}, ${{ matrix.env }})
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        env:
          - ci/310-conda.yaml
          - ci/311-conda.yaml
          - ci/312-conda.yaml
          - ci/313-conda.yaml
          - ci/314-conda.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: ${{ matrix.env }}
          auto-activate-base: false
          activate-environment: test
          channel-priority: strict

      - name: Install pyrosm
        shell: bash -l {0}
        # Build the Cython extensions against the conda-provided build deps
        # (Cython, cykhash) instead of recompiling them in an isolated env.
        run: pip install -e . --no-build-isolation

      - name: Check environment
        shell: bash -l {0}
        run: |
          micromamba info
          micromamba list

      - name: Test pyrosm
        shell: bash -l {0}
        # Exercise the live download tests (BBBike + Geofabrik) on a single
        # runner only (see tests/test_data.py) so we don't overload those
        # services by fetching from every OS/Python combination in the matrix.
        env:
          RUN_DOWNLOAD_TESTS: "${{ matrix.os == 'windows-latest' && matrix.env == 'ci/314-conda.yaml' }}"
        run: pytest -v -r s --color=yes --cov=pyrosm --cov-append --cov-report term-missing --cov-report xml tests/

      - name: Update codecov.io
        uses: codecov/codecov-action@v5
        with:
          # Use the repo upload token from secrets. The legacy v3.1.1 uploader
          # used the rate-limited tokenless endpoint; v5 uses the Codecov CLI.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          # Coverage upload is informational; a transient Codecov problem
          # (e.g. a 429 rate limit) must not fail the test job.
          fail_ci_if_error: false
