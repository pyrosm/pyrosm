name: test

channels:
  - conda-forge

dependencies:
  - python=3.14
  # required
  - cython
  - cykhash>=2
  - geopandas
  - pyrobuf
  - python-rapidjson
  # optional
  - networkx
  # NOTE: pandana has no Python 3.13+ build on conda-forge yet; the pandana
  # graph-export tests are skipped on 3.13/3.14 (see tests/test_graph_exports.py).
  - python-igraph
  # testing
  - black
  - codecov
  - pytest
  - pytest-cov
  - requests
